name: Publish to PyPI

# Build native (maturin/PyO3) wheels per (os, arch) as artifacts, then upload
# them in one final job with twine. Modeled on SauersML/gam's pypi-wheels.yml.
#
# The Python package (`python/pyproject.toml`) uses the maturin build backend
# with `manifest-path = "../Cargo.toml"` and the `python` Cargo feature, so each
# wheel embeds the compiled `gnomon._gnomon` extension and runs the Rust core
# in-process. abi3-py39 means one wheel per platform covers CPython >= 3.9.
#
# Triggers:
#   * push to main           — publishes if python/pyproject.toml's
#                              [project].version changed; twine --skip-existing
#                              no-ops otherwise.
#   * push of a v* tag       — normal release path.
#   * workflow_dispatch      — on-demand republish.

on:
  push:
    branches: [main]
    paths:
      - 'python/**'
      - 'shared/**'
      - 'score/**'
      - 'map/**'
      - 'terms/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/pypi-publish.yml'
    tags: ['v*']
  workflow_dispatch: {}

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: true
      matrix:
        platform:
          - { runner: ubuntu-24.04,     target: x86_64 }
          - { runner: ubuntu-24.04-arm, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build Linux wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          rust-toolchain: nightly
          args: >-
            --release
            --strip
            --out dist
            --manifest-path python/pyproject.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: true
      matrix:
        platform:
          - { runner: macos-15-intel, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          rust-toolchain: nightly
          args: >-
            --release
            --strip
            --out dist
            --manifest-path python/pyproject.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path python/pyproject.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Upload to PyPI
    needs: [linux, macos, sdist]
    if: |
      always() &&
      needs.linux.result == 'success' &&
      needs.sdist.result == 'success' &&
      needs.macos.result != 'failure' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-24.04
    environment: pypi
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Download all wheel + sdist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show what will be uploaded
        run: ls -la dist
      - name: Upload to PyPI via twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --skip-existing --non-interactive dist/*
