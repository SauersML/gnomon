name: Convert consumer genomes and score examples

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'examples/convert_score.py'
      - 'examples/tests/test_convert_score.py'
      - 'score/**'
      - '.github/workflows/convert-score.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'examples/convert_score.py'
      - 'examples/tests/test_convert_score.py'
      - 'score/**'
      - '.github/workflows/convert-score.yml'

jobs:
  run-example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Build local gnomon
        env:
          GNOMON_SKIP_LINT_CHECKS: 1
        run: cargo +nightly build --release

      - name: Install convert_genome
        run: curl -fsSL https://raw.githubusercontent.com/SauersML/convert_genome/main/install.sh | bash

      - name: Add binaries to PATH (prefer local build)
        run: |
          echo "$GITHUB_WORKSPACE/target/release" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run convert_score example
        run: python examples/convert_score.py
