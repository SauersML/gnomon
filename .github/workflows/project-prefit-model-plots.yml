name: Project Prefit Model Plots

on:
  workflow_dispatch:
    inputs:
      downsample_factor:
        description: "Downsampling factor applied per superpopulation/subpopulation group (>=1)"
        required: false
        default: "1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  PROJECT_PREFIT_INPUT: >-
    gs://gcp-public-data--gnomad/resources/hgdp_1kg/phased_haplotypes_v2/hgdp1kgp_chr20.filtered.SNV_INDEL.phased.shapeit5.bcf

jobs:
  project-and-plot:
    name: Project and plot (${{ matrix.label }})
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: hwe_1kg_hgdp_gsa_v2
            label: gsa2
            title: HGDP + 1KG chr20 projection with GSA v2 prefit model
          - model: hwe_1kg_hgdp_gsa_v3
            label: gsa3
            title: HGDP + 1KG chr20 projection with GSA v3 prefit model
          - model: hwe_1kg_hgdp_gda_v1
            label: gda
            title: HGDP + 1KG chr20 projection with GDA v1 prefit model
          - model: hwe_1kg_hgdp_intersection
            label: intersection
            title: HGDP + 1KG chr20 projection with intersection prefit model

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements-project-prefit.txt

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-targets: false
          cache-all-crates: true
          shared-key: project-prefit-model-plots

      - name: Install plotting dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-project-prefit.txt

      - name: Build gnomon-map on the projection runner
        run: |
          cargo +nightly build --release --no-default-features --features map --bin gnomon-map

      - name: Project full dataset
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$PWD"
          OUT_DIR="$ROOT/artifacts/${{ matrix.label }}"
          mkdir -p "$OUT_DIR"
          cd "$OUT_DIR"

          /usr/bin/time -f 'elapsed=%E\nuser=%U\nsys=%S\nmaxrss_kb=%M' \
            "$ROOT/target/release/gnomon-map" project \
            "${{ env.PROJECT_PREFIT_INPUT }}" \
            --model "${{ matrix.model }}" \
            --output-manifest project_outputs.json \
            2>&1 | tee project.log

      - name: Validate projection outputs
        id: projection_outputs
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$PWD/artifacts/${{ matrix.label }}"
          MANIFEST_PATH="$OUT_DIR/project_outputs.json"
          if [[ ! -f "$MANIFEST_PATH" ]]; then
            echo "Projection output manifest was not created: $MANIFEST_PATH" >&2
            find "$OUT_DIR" -maxdepth 1 -type f | sort >&2
            exit 1
          fi

          cd "$OUT_DIR"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          manifest_path = Path("project_outputs.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          required = ("scores", "scores_metadata")
          for key in required:
              raw = manifest.get(key)
              if not isinstance(raw, str) or not raw:
                  raise SystemExit(f"Manifest entry {key!r} is missing or invalid: {raw!r}")
              path = Path(raw)
              if not path.is_file():
                  raise SystemExit(f"Manifest entry {key!r} points to missing file: {path}")
              print(f"{key}={path}")
          print(f"manifest={manifest_path}")
          PY

      - name: Render PCA plot
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$PWD"
          OUT_DIR="$ROOT/artifacts/${{ matrix.label }}"
          cd "$OUT_DIR"

          python "$ROOT/scripts/plot_project_projection.py" \
            --scores-bin "${{ steps.projection_outputs.outputs.scores }}" \
            --metadata-json "${{ steps.projection_outputs.outputs.scores_metadata }}" \
            --output-png pc1_pc2.png \
            --output-tsv projection_scores_annotated.tsv \
            --model-name "${{ matrix.title }}" \
            --downsample-factor "${{ github.event.inputs.downsample_factor || '1' }}"

      - name: Add workflow summary
        run: |
          {
            echo "### ${{ matrix.title }}"
            echo ""
            echo "- Model key: \`${{ matrix.model }}\`"
            echo "- Plot: \`artifacts/${{ matrix.label }}/pc1_pc2.png\`"
            echo "- Annotated scores: \`artifacts/${{ matrix.label }}/projection_scores_annotated.tsv\`"
            echo "- Raw projection: \`artifacts/${{ matrix.label }}/${{ steps.projection_outputs.outputs.scores }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project-prefit-${{ matrix.label }}
          path: |
            artifacts/${{ matrix.label }}/pc1_pc2.png
            artifacts/${{ matrix.label }}/projection_scores_annotated.tsv
            artifacts/${{ matrix.label }}/${{ steps.projection_outputs.outputs.scores }}
            artifacts/${{ matrix.label }}/${{ steps.projection_outputs.outputs.scores_metadata }}
            artifacts/${{ matrix.label }}/${{ steps.projection_outputs.outputs.manifest }}
            artifacts/${{ matrix.label }}/sample_population_mapping.tsv
            artifacts/${{ matrix.label }}/project.log
          if-no-files-found: error

  collect:
    name: Collect all model artifacts
    needs: project-and-plot
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Download per-model artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: project-prefit-*
          path: collected
          merge-multiple: false

      - name: Summarize collected artifacts
        run: |
          {
            echo "## Combined artifact bundle"
            echo ""
            find collected -type f | sort | sed 's/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: project-prefit-all-models
          path: collected
          if-no-files-found: error
