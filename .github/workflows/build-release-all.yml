name: Build and Release All

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Cargo.toml'
      - '**/*.rs'
      - 'install.sh'
      - '.github/workflows/build-release-all.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GNOMON_SKIP_LINT_CHECKS: "1"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # MacOS ARM (Apple Silicon) - GH Actions uses M1
          - os: macos-14
            target: aarch64-apple-darwin
            asset_suffix: macos-arm64
            cpu: apple-m1

          # MacOS Intel - use macos-15-intel which runs on Intel hardware
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_suffix: macos-intel
            cpu: x86-64-v3

          # Linux x86_64 portable baseline. Build with Zig's glibc 2.17 sysroot
          # so the default installer asset works on older HPC distributions.
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu.2.17
            asset_suffix: linux-x64
            cpu: x86-64
            use_zig: true
            glibc_floor: "2.17"

          # Linux x86_64 fast path. Same old-glibc floor, but compiled for
          # x86-64-v3 machines and selected by the installer only when supported.
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu.2.17
            asset_suffix: linux-x64-v3
            cpu: x86-64-v3
            use_zig: true
            glibc_floor: "2.17"

          # Linux ARM64 portable baseline with the same old-glibc floor.
          - os: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            target: aarch64-unknown-linux-gnu.2.17
            asset_suffix: linux-arm64
            cpu: generic
            use_zig: true
            glibc_floor: "2.17"

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x64
            cpu: x86-64-v3

          # Windows ARM64 (native ARM runner)
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset_suffix: windows-arm64
            cpu: cortex-a76

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: ${{ matrix.rust_target || matrix.target }}

      - name: Install NVIDIA CUDA Toolkit
        if: matrix.rust_target == 'x86_64-unknown-linux-gnu'
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.2.2'

      - name: Install Zig linker for old-glibc Linux builds
        if: matrix.use_zig == true
        shell: bash
        run: |
          python3 -m pip install --user ziglang
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          cargo +nightly install cargo-zigbuild --locked

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.asset_suffix }}-${{ matrix.target }}

      - name: Remove local cargo config
        # Prevent .cargo/config.toml's target-cpu=native from interfering with release builds
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Build and package binaries
        shell: bash
        env:
          # Use specific CPU target instead of 'native' to fix ring#2527 while keeping max optimization
          RUSTFLAGS: "-C target-cpu=${{ matrix.cpu }}"
          GNOMON_SKIP_LINT_CHECKS: "1"
          # Embed commit-addressable release tag in binary for version command
          GNOMON_RELEASE_TAG: "main-${{ github.sha }}"
          TARGET: ${{ matrix.target }}
          RUST_TARGET: ${{ matrix.rust_target || matrix.target }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          USE_ZIG: ${{ matrix.use_zig || false }}
          GLIBC_FLOOR: ${{ matrix.glibc_floor || '' }}
        id: build_binaries
        run: |
          set +e

          mkdir -p dist
          : > build-failures.txt

          artifact_target_dir() {
            if [ -n "$RUST_TARGET" ]; then
              printf '%s\n' "$RUST_TARGET"
            else
              printf '%s\n' "$TARGET"
            fi
          }

          version_gt() {
            [ "$(printf '%s\n%s\n' "$2" "$1" | sort -V | head -n 1)" != "$1" ]
          }

          verify_glibc_floor() {
            local source_path="$1"

            if [ -z "$GLIBC_FLOOR" ] || [ "$RUNNER_OS" != "Linux" ]; then
              return 0
            fi

            local max_glibc
            max_glibc="$(
              readelf --version-info "$source_path" 2>/dev/null \
                | grep -o 'GLIBC_[0-9][0-9.]*' \
                | sed 's/^GLIBC_//' \
                | sort -V \
                | tail -n 1
            )"

            if [ -z "$max_glibc" ]; then
              echo "::error::Could not determine GLIBC version requirements for ${source_path}"
              return 1
            fi

            echo "Maximum GLIBC requirement for ${source_path}: ${max_glibc}"
            if version_gt "$max_glibc" "$GLIBC_FLOOR"; then
              echo "::error::${source_path} requires GLIBC_${max_glibc}, above floor GLIBC_${GLIBC_FLOOR}"
              return 1
            fi
          }

          build_one() {
            local binary_name="$1"
            local feature_name="$2"
            local asset_prefix="$3"
            local source_name="$binary_name"
            if [ "$RUNNER_OS" = "Windows" ]; then
              source_name="${source_name}.exe"
            fi

            local build_cmd=(
              cargo +nightly
            )
            if [ "$USE_ZIG" = "true" ]; then
              build_cmd+=(zigbuild)
            else
              build_cmd+=(build)
            fi
            build_cmd+=(--release --target "$TARGET")
            if [ -n "$feature_name" ]; then
              build_cmd+=(--no-default-features --features "$feature_name")
            fi
            build_cmd+=(--bin "$binary_name")

            echo "::group::Build ${binary_name}"
            "${build_cmd[@]}"
            local build_status=$?
            echo "::endgroup::"

            if [ "$build_status" -ne 0 ]; then
              echo "${binary_name}" >> build-failures.txt
              return 0
            fi

            local asset_base="${asset_prefix}-${ASSET_SUFFIX}"
            local source_path="target/$(artifact_target_dir)/release/${source_name}"
            if [ ! -f "$source_path" ] && [ "$RUST_TARGET" != "$TARGET" ]; then
              source_path="target/${TARGET}/release/${source_name}"
            fi
            if [ ! -f "$source_path" ]; then
              echo "::error::Built binary not found for ${binary_name}"
              echo "${binary_name}" >> build-failures.txt
              return 0
            fi

            if ! verify_glibc_floor "$source_path"; then
              echo "${binary_name}" >> build-failures.txt
              return 0
            fi

            if [ "$RUNNER_OS" = "Windows" ]; then
              cp "$source_path" "dist/${asset_base}.exe"
              powershell -NoLogo -NoProfile -Command \
                "Compress-Archive -Path 'dist/${asset_base}.exe' -DestinationPath 'dist/${asset_base}.zip' -Force"
              rm -f "dist/${asset_base}.exe"
            else
              cp "$source_path" "dist/${asset_base}"
              tar -czf "dist/${asset_base}.tar.gz" -C dist "${asset_base}"
              rm -f "dist/${asset_base}"
            fi
          }

          build_one gnomon "" gnomon
          build_one gnomon-map map gnomon-map
          build_one gnomon-score score gnomon-score
          build_one gnomon-terms terms gnomon-terms
          build_one gnomon-calibrate calibrate gnomon-calibrate

          if [ -s build-failures.txt ]; then
            {
              echo "failed=true"
              echo "failed_binaries<<EOF"
              cat build-failures.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: dist/*
          if-no-files-found: ignore

      - name: Fail if any binary build failed
        if: steps.build_binaries.outputs.failed == 'true'
        shell: bash
        run: |
          echo "The following binaries failed for ${{ matrix.target }}:"
          echo "${{ steps.build_binaries.outputs.failed_binaries }}"
          exit 1

  release:
    name: Create Release
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true
          if-no-artifact-found: ignore

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Generate release tag
        id: tag
        run: echo "release_tag=main-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Create Release
        if: ${{ hashFiles('artifacts/*') != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          files: artifacts/**/*
          fail_on_unmatched_files: false
