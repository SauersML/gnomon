name: Profiling Fit Run

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  profiling-fit:
    name: Build, Profile & Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reclaim disk space
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          df -h

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Ensure perf tooling is available
        run: |
          set -euxo pipefail
          CURRENT_KERNEL="$(uname -r)"
          KERNEL_NO_FLAVOR="${CURRENT_KERNEL%%-*}"
          KERNEL_MAJOR_MINOR="$(echo "$CURRENT_KERNEL" | cut -d. -f1-2)"

          sudo apt-get update -y

          install_pkg_if_available() {
            local pkg="$1"
            if apt-cache policy "$pkg" 2>/dev/null | grep -q 'Candidate: (none)'; then
              echo "Skipping unavailable package: $pkg"
              return 1
            else
              sudo apt-get install -y --no-install-recommends "$pkg"
              return 0
            fi
          }

          install_pkg_if_available linux-tools-common || true

          HAVE_KERNEL_TOOLS=0
          if install_pkg_if_available "linux-tools-${CURRENT_KERNEL}"; then
            HAVE_KERNEL_TOOLS=1
          fi
          install_pkg_if_available "linux-cloud-tools-${CURRENT_KERNEL}" || true

          if [ "$HAVE_KERNEL_TOOLS" -eq 0 ]; then
            install_pkg_if_available linux-tools-azure || true
            install_pkg_if_available linux-cloud-tools-azure || true
          fi

          ensure_perf_symlink() {
            local candidate
            for candidate in \
              "/usr/bin/perf_${CURRENT_KERNEL}" \
              "/usr/bin/perf_${KERNEL_NO_FLAVOR}" \
              "/usr/bin/perf_${KERNEL_MAJOR_MINOR}" \
              "/usr/lib/linux-tools-${CURRENT_KERNEL}/perf" \
              "/usr/lib/linux-tools-${KERNEL_NO_FLAVOR}/perf" \
              "/usr/lib/linux-tools-${KERNEL_MAJOR_MINOR}/perf"; do
              if [ -x "$candidate" ]; then
                echo "Linking perf from $candidate"
                sudo ln -sf "$candidate" /usr/local/bin/perf
                return 0
              fi
            done

            candidate=$(find /usr/lib/linux-tools -maxdepth 2 -type f -name perf -print -quit 2>/dev/null || true)
            if [ -n "$candidate" ]; then
              echo "Linking perf from $candidate"
              sudo ln -sf "$candidate" /usr/local/bin/perf
              return 0
            fi

            return 1
          }

          ensure_perf_symlink || true
          hash -r || true

          if ! command -v perf >/dev/null 2>&1; then
            echo "::error::perf binary not found after installation attempts"
            exit 1
          fi

          if ! perf --version >/dev/null 2>&1; then
            echo "perf command exists but failed; retrying symlink resolution..."
            ensure_perf_symlink || true
            hash -r || true
          fi

          if ! perf --version >/dev/null 2>&1; then
            echo "::error::perf is present but unusable for kernel ${CURRENT_KERNEL}"
            command -v perf || true
            perf --version || true
            exit 1
          fi

          perf --version

      - name: Allow perf events recording
        run: |
          set -euxo pipefail
          sudo sysctl -w kernel.perf_event_paranoid=0

      - name: Build profiling binary
        env:
          CARGO_INCREMENTAL: 0
          GNOMON_SKIP_LINT_CHECKS: 1
        run: |
          set -euxo pipefail
          cargo +nightly build --profile profiling --features no-inline-profiling

      - name: Profile gnomon fit workload (30 min max, disk-friendly)
        env:
          PERF_DATA: perf.data
        run: |
          set -euo pipefail

          if perf record --call-graph lbr -F 50 -e task-clock:u -o /dev/null -- true 2>/dev/null; then
            CALLGRAPH="--call-graph lbr"
          else
            CALLGRAPH="--call-graph dwarf,256"
          fi

          echo "Starting perf record with space-optimized settings"
          echo "Call graph mode: $CALLGRAPH"
          echo "Sampling frequency: 50 Hz"
          echo "Timeout: 30 minutes hard cap"

          STATUS=0
          if ! timeout --signal=INT --kill-after=30s 30m perf record $CALLGRAPH -F 50 -e task-clock:u -z --no-buildid --no-buildid-cache -g -o "$PERF_DATA" -- target/profiling/gnomon --fit "gs://gcp-public-data--gnomad/resources/hgdp_1kg/phased_haplotypes_v2/hgdp1kgp_chr20.filtered.SNV_INDEL.phased.shapeit5.bcf" --components 16 --list "https://github.com/SauersML/genomic_pca/raw/refs/heads/main/data/GSAv2_hg38.tsv"; then
            STATUS=$?
          fi

          if [ "$STATUS" -eq 124 ]; then
            echo "::warning::perf recording stopped after 30 minutes (timeout)"
          elif [ "$STATUS" -ne 0 ]; then
            echo "::error::perf record failed with status $STATUS"
            exit "$STATUS"
          fi

          if [ -f "$PERF_DATA" ]; then
            ls -lh "$PERF_DATA"
          else
            echo "::error::perf.data not produced"
            exit 1
          fi

          df -h

      - name: Render perf reports
        env:
          PERF_DATA: perf.data
        run: |
          set -euo pipefail
          if [ ! -f "$PERF_DATA" ]; then
            echo "::error::perf.data not found"
            exit 1
          fi

          echo "==================== PERF REPORT (flat) ===================="
          perf report --stdio --no-children --sort=symbol --percent-limit=0.5 -i "$PERF_DATA"
          echo "==========================================================="

          echo "==================== PERF REPORT (call graph) =============="
          perf report --stdio --call-graph=graph --percent-limit=2 -i "$PERF_DATA"
          echo "==========================================================="

      - name: Cleanup perf artifact to free space
        env:
          PERF_DATA: perf.data
        run: |
          set -euxo pipefail
          rm -f "$PERF_DATA" || true
          df -h
